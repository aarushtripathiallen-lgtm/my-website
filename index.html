<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOCKY | Financial Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

    <style>
        /* --- CSS Variables & Theming --- */
        :root {
            --bg-color: #0b0e14;
            --surface-color: #1a1d24;
            --border-color: #2a2e39;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --trend-up: #10b981;
            --trend-down: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top left, #161a25 0%, var(--bg-color) 50%);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Layout Structure --- */
        .sidebar {
            width: 260px;
            background-color: var(--surface-color);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-dot {
            width: 10px;
            height: 10px;
            background-color: var(--accent-blue);
            border-radius: 50%;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-links li {
            color: var(--text-muted);
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-links li:hover {
            color: var(--text-main);
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        header {
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
        }

        header p {
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* --- Dashboard Grid & Cards --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .stock-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            /* Native CSS transition for buttery smooth hover effects */
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
            cursor: pointer;
            opacity: 0; /* Hidden initially for Anime.js entrance */
        }

        .stock-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
            border-color: var(--accent-blue);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .ticker {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .sentiment {
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 8px;
            border-radius: 4px;
            color: var(--text-muted);
        }

        .price-container {
            margin-bottom: 16px;
        }

        .price {
            font-size: 2.2rem;
            font-weight: 700;
            display: inline-block;
        }

        .metrics {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="brand">
            <div class="brand-dot"></div>
            STOCKY
        </div>
        <ul class="nav-links">
            <li style="color: var(--text-main);">Overview</li>
            <li>Markets</li>
            <li>News Sentiment</li>
            <li>Portfolios</li>
            <li>Settings</li>
        </ul>
    </nav>

    <main class="main-content">
        <header>
            <h1>Market Overview</h1>
            <p>Real-time tracking and metrics.</p>
        </header>

        <div class="dashboard-grid" id="stock-grid">
            </div>
    </main>

    <script>
        /**
         * --- 1. DATA LAYER ---
         * Later, replace this mock data with fetch() calls to your backend API.
         */
        const initialStocks = [
            { ticker: 'AAPL', name: 'Apple Inc.', price: 173.50, cap: '2.7T', pe: '28.1', sentiment: 'Bullish' },
            { ticker: 'MSFT', name: 'Microsoft Corp.', price: 420.21, cap: '3.1T', pe: '35.4', sentiment: 'Neutral' },
            { ticker: 'TSLA', name: 'Tesla Inc.', price: 185.10, cap: '580B', pe: '42.0', sentiment: 'Bearish' },
            { ticker: 'NVDA', name: 'NVIDIA Corp.', price: 890.05, cap: '2.2T', pe: '75.3', sentiment: 'Bullish' },
            { ticker: 'AMZN', name: 'Amazon.com', price: 178.22, cap: '1.8T', pe: '60.1', sentiment: 'Bullish' },
            { ticker: 'GOOGL', name: 'Alphabet Inc.', price: 155.40, cap: '1.9T', pe: '24.5', sentiment: 'Neutral' }
        ];

        /**
         * --- 2. UI RENDERING ---
         */
        const grid = document.getElementById('stock-grid');

        function renderCards() {
            initialStocks.forEach(stock => {
                const card = document.createElement('div');
                card.className = 'stock-card';
                card.setAttribute('data-ticker', stock.ticker);
                
                card.innerHTML = `
                    <div class="card-header">
                        <span class="ticker">${stock.ticker}</span>
                        <span class="sentiment">AI: ${stock.sentiment}</span>
                    </div>
                    <div class="price-container">
                        $<span class="price" id="price-${stock.ticker}">${stock.price.toFixed(2)}</span>
                    </div>
                    <div class="metrics">
                        <span>Cap: ${stock.cap}</span>
                        <span>P/E: ${stock.pe}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        /**
         * --- 3. ANIMATION CONTROLLER (Anime.js) ---
         * Modular object to handle all motion design.
         */
        const StockyAnimations = {
            
            // Staggered Entrance
            playEntrance() {
                anime({
                    targets: '.stock-card',
                    translateY: [30, 0], // Slide up from 30px
                    opacity: [0, 1],     // Fade in
                    duration: 800,
                    easing: 'easeOutElastic(1, .8)',
                    delay: anime.stagger(100) // 100ms delay between each card
                });
            },

            // Price Update Pulse Effect
            pulsePrice(ticker, isPositive) {
                const priceElement = document.getElementById(`price-${ticker}`);
                const color = isPositive ? 'var(--trend-up)' : 'var(--trend-down)';
                
                // Timeline allows sequencing animations on the same element
                const tl = anime.timeline({
                    easing: 'easeOutExpo',
                    duration: 400
                });

                tl.add({
                    targets: priceElement,
                    scale: 1.15, // Swell up
                    color: color, // Change to green or red
                }).add({
                    targets: priceElement,
                    scale: 1, // Shrink back to normal
                    color: 'var(--text-main)', // Return to white
                    duration: 600
                });
            }
        };

        /**
         * --- 4. MOCK REAL-TIME UPDATES ---
         * Simulates a WebSocket or polling data stream.
         */
        function startDataStreamMock() {
            setInterval(() => {
                // Pick a random stock
                const randomStock = initialStocks[Math.floor(Math.random() * initialStocks.length)];
                
                // Generate a slight price change (-2 to +2 dollars)
                const change = (Math.random() * 4) - 2;
                const newPrice = randomStock.price + change;
                randomStock.price = newPrice;

                // Update DOM
                const priceElement = document.getElementById(`price-${randomStock.ticker}`);
                if (priceElement) {
                    priceElement.innerText = newPrice.toFixed(2);
                }

                // Trigger Animation
                StockyAnimations.pulsePrice(randomStock.ticker, change >= 0);

            }, 2500); // Trigger every 2.5 seconds
        }

        // --- Initialize Dashboard ---
        renderCards();
        StockyAnimations.playEntrance();
        
        // Wait for entrance animation to finish before starting real-time mock
        setTimeout(startDataStreamMock, 1500); 

    </script>
</body>
</html>
